<!doctype html>
<html><head><meta charset="utf-8"><title>Ruffle ABC test</title></head>
<body style="background:#222;color:#eee;font:14px monospace;padding:20px">
<h3>Ruffle ABC compatibility test</h3>
<div id="status">Loading…</div>
<div id="player" style="width:400px;height:200px;background:#111;margin-top:20px"></div>
<script src="ruffle/ruffle.js"></script>
<script>
window.addEventListener("load", async () => {
  const s = document.getElementById("status");
  const ruffle = window.RufflePlayer.newest();
  const p = ruffle.createPlayer();
  p.style.width = "100%"; p.style.height = "100%";
  document.getElementById("player").appendChild(p);
  try {
    await p.load({ url: "bin/Hello.swf", autoplay: "on" });
    s.textContent = "Hello.swf loaded OK (no ABC error).";
  } catch (e) {
    s.textContent = "FAILED: " + e.message;
  }
});
</script>
</body></html>

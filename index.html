<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iso Room Editor</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #11161b; color: #e6e6e6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #stage    { position: fixed; inset: 0; }
    #ruffle   { width: 100%; height: 100%; }
    #status   { position: fixed; left: 12px; bottom: 12px; padding: 8px 12px; background: rgba(0,0,0,0.55); border-radius: 6px; font-size: 13px; pointer-events: none; }
    #status a { color: #6cf; }
    .error    { color: #ff6b6b; }
  </style>
</head>
<body>
  <div id="stage"><div id="ruffle"></div></div>
  <div id="status">Loading Ruffle…</div>

  <!--
    Ruffle (Flash Player emulator, Rust + WebAssembly).
    Self-hosted: drop the matching ruffle.js + ruffle.wasm into web/ruffle/
    from https://github.com/ruffle-rs/ruffle/releases (the "selfhosted" zip).
    The CDN fallback below works for quick tests but rate-limits in production.
  -->
  <script src="ruffle/ruffle.js"
          onerror="this.onerror=null; this.src='https://unpkg.com/@ruffle-rs/ruffle';"></script>

  <script>
    const status = document.getElementById("status");
    const setStatus = (msg, isError) => {
      status.textContent = msg;
      status.classList.toggle("error", !!isError);
    };

    // Right-click pan bridge.
    // The SWF targets Flash Player 11.1 (Ruffle's AVM2 verifier rejects newer
    // targets), so MouseEvent.RIGHT_MOUSE_DOWN never reaches the SWF. The AS3
    // input handler already supports Space+drag for panning; this bridge maps
    // right-click-drag onto Space+left-drag by dispatching synthetic events to
    // the Ruffle player element. Keeps the AS3 source/normal AIR build untouched.
    function installRightClickPanBridge(player) {
      let active = false;
      let lastEvt = null;

      const makeMouse = (type, src, buttons) => new MouseEvent(type, {
        bubbles: true, cancelable: true, composed: true, view: window,
        button: 0, buttons: buttons,
        clientX: src.clientX, clientY: src.clientY,
        screenX: src.screenX, screenY: src.screenY,
      });
      const makeKey = (type) => new KeyboardEvent(type, {
        bubbles: true, cancelable: true, composed: true,
        key: " ", code: "Space", keyCode: 32, which: 32,
      });

      // Suppress the browser context menu over the player.
      player.addEventListener("contextmenu", (e) => e.preventDefault(), true);

      // Start panning on right-mouse-down.
      player.addEventListener("mousedown", (e) => {
        if (e.button !== 2 || active) return;
        e.preventDefault();
        e.stopPropagation();
        active = true;
        lastEvt = e;
        player.dispatchEvent(makeKey("keydown"));
        player.dispatchEvent(makeMouse("mousedown", e, 1));
      }, true);

      // Forward movement while panning. Listen on window so dragging past the
      // player edge still updates the camera until the user releases.
      window.addEventListener("mousemove", (e) => {
        if (!active) return;
        lastEvt = e;
        player.dispatchEvent(makeMouse("mousemove", e, 1));
      }, true);

      const stop = (e) => {
        if (!active) return;
        if (e && e.type === "mouseup" && e.button !== 2) return;
        active = false;
        const src = e && e.clientX != null ? e : lastEvt;
        if (src) player.dispatchEvent(makeMouse("mouseup", src, 0));
        player.dispatchEvent(makeKey("keyup"));
      };
      window.addEventListener("mouseup", stop, true);
      window.addEventListener("blur", stop, true);
    }

    window.addEventListener("load", async () => {
      if (typeof window.RufflePlayer === "undefined") {
        setStatus("Ruffle failed to load. Check web/ruffle.js or your internet.", true);
        return;
      }

      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      player.id = "ruffle-player";
      player.style.width = "100%";
      player.style.height = "100%";
      document.getElementById("ruffle").appendChild(player);

      try {
        await player.load({
          // Project layout: SWF lives in /bin, fods/ lives at the root. The
          // static server document root is the project root, so we reference
          // the SWF by /bin/NewProject.swf. URL paths inside the SWF (manifest,
          // assets) are kept SWF-relative so FlashDevelop's local player also
          // works; the `base` option below tells Ruffle to resolve them against
          // /bin/ instead of the host page URL.
          url: "bin/NewProject.swf?v=3",
          // Resolve relative URLoader paths inside the SWF against /bin/ so
          // "assets/wall.png" → "/bin/assets/wall.png" and "manifest.json" →
          // "/bin/manifest.json" and "../fods/..." → "/fods/...". Without this
          // Ruffle would resolve against /web/ (the host page) and 404.
          base: "bin/",
          // The compiled SWF was an AIR app; tell Ruffle to emulate Flash Player so
          // any leftover AIR-only APIs degrade gracefully instead of throwing.
          allowScriptAccess: true,
          autoplay: "on",
          unmuteOverlay: "hidden",
          backgroundColor: "#11161b",
          letterbox: "on",
          warnOnUnsupportedContent: false,
          // Suppress Ruffle's built-in right-click menu (quality, About, etc.).
          // The right-click-pan bridge above synthesizes Space+drag from the
          // right-button event so panning works even though the SWF (FP 11.1)
          // can't receive RIGHT_MOUSE_DOWN natively.
          contextMenu: "off",
          // Standard Flash Player; AIR-specific calls (flash.filesystem.*) will no-op.
          playerVersion: 32,
        });
        setStatus("Loaded. (Save/Load buttons may trigger browser downloads.)");
        setTimeout(() => status.style.display = "none", 4000);
        installRightClickPanBridge(player);
      } catch (err) {
        console.error(err);
        setStatus("Failed to load NewProject.swf: " + err.message, true);
      }
    });
  </script>
</body>
</html>

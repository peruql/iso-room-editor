<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iso Room Editor</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #11161b; color: #e6e6e6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #stage    { position: fixed; inset: 0; }
    #ruffle   { width: 100%; height: 100%; }
    #status   { position: fixed; left: 12px; top: 12px; padding: 6px 10px; background: rgba(0,0,0,0.55); border-radius: 6px; font-size: 12px; pointer-events: none; }
    #status a { color: #6cf; }
    .error    { color: #ff6b6b; }
    #download { position: fixed; left: 12px; bottom: 12px; padding: 7px 12px; background: linear-gradient(135deg, #ffb347, #ff7a59); border-radius: 6px; font-size: 12px; font-weight: 700; color: #1b1f23; text-decoration: none; box-shadow: 0 3px 10px rgba(0, 0, 0, 0.45); letter-spacing: 0.2px; transition: transform 0.15s ease, box-shadow 0.15s ease; z-index: 10; line-height: 1.15; }
    #download:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(255, 122, 89, 0.55); }
    #download small { display: block; font-size: 10px; font-weight: 500; opacity: 0.8; margin-top: 1px; letter-spacing: 0; }
  </style>
</head>
<body>
  <div id="stage"><div id="ruffle"></div></div>
  <a id="download" href="https://github.com/peruql/iso-room-editor/releases/latest/download/dead-maze-editor-local.zip" download="dead-maze-editor-local.zip" title="Standalone Flash build — runs locally in flashplayer.exe / ruffle.exe. 29 MB. Hosted on GitHub.">↓ Local Editor (faster)<small>flashplayer.exe · 29 MB</small></a>
  <div id="status">Loading Ruffle…</div>

  <script src="ruffle/ruffle.js"
          onerror="this.onerror=null; this.src='https://unpkg.com/@ruffle-rs/ruffle';"></script>

  <script>
    const status = document.getElementById("status");
    const setStatus = (msg, isError) => {
      status.textContent = msg;
      status.classList.toggle("error", !!isError);
    };

    // Right-click pan bridge: SWF targets FP 11.1 which doesn't get
    // RIGHT_MOUSE_DOWN, so map right-click-drag onto Space+left-drag by
    // dispatching synthetic events at Ruffle's internal canvas.
    function installRightClickPanBridge(player) {
      const findCanvas = () => {
        const root = player.shadowRoot;
        if (!root) return null;
        return root.querySelector("canvas") ||
               root.querySelector("#player") ||
               root.querySelector("[id^='ruffle']");
      };

      let canvas = findCanvas();
      if (!canvas) {
        let tries = 0;
        const iv = setInterval(() => {
          canvas = findCanvas();
          if (canvas || ++tries > 40) {
            clearInterval(iv);
            if (canvas) attach(canvas);
          }
        }, 50);
      } else {
        attach(canvas);
      }

      function attach(target) {
        let active = false;
        let lastEvt = null;

        const makeMouse = (type, src, buttons) => new MouseEvent(type, {
          bubbles: true, cancelable: true, composed: true, view: window,
          button: 0, buttons: buttons,
          clientX: src.clientX, clientY: src.clientY,
          screenX: src.screenX, screenY: src.screenY,
        });
        const makeKey = (type) => new KeyboardEvent(type, {
          bubbles: true, cancelable: true, composed: true, view: window,
          key: " ", code: "Space", keyCode: 32, which: 32,
        });

        const killCtx = (e) => e.preventDefault();
        player.addEventListener("contextmenu", killCtx, true);
        target.addEventListener("contextmenu", killCtx, true);

        const startPan = (e) => {
          if (e.button !== 2 || active) return;
          e.preventDefault();
          e.stopPropagation();
          active = true;
          lastEvt = e;
          window.dispatchEvent(makeKey("keydown"));
          document.dispatchEvent(makeKey("keydown"));
          target.dispatchEvent(makeMouse("mousedown", e, 1));
        };
        player.addEventListener("mousedown", startPan, true);
        target.addEventListener("mousedown", startPan, true);

        window.addEventListener("mousemove", (e) => {
          if (!active) return;
          lastEvt = e;
          target.dispatchEvent(makeMouse("mousemove", e, 1));
        }, true);

        const stop = (e) => {
          if (!active) return;
          if (e && e.type === "mouseup" && e.button !== 2) return;
          active = false;
          const src = e && e.clientX != null ? e : lastEvt;
          if (src) target.dispatchEvent(makeMouse("mouseup", src, 0));
          window.dispatchEvent(makeKey("keyup"));
          document.dispatchEvent(makeKey("keyup"));
        };
        window.addEventListener("mouseup", stop, true);
        window.addEventListener("blur", stop, true);
      }
    }

    window.addEventListener("load", async () => {
      if (typeof window.RufflePlayer === "undefined") {
        setStatus("Ruffle failed to load. Check web/ruffle.js or your internet.", true);
        return;
      }

      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      player.id = "ruffle-player";
      player.style.width = "100%";
      player.style.height = "100%";
      document.getElementById("ruffle").appendChild(player);

      try {
        await player.load({
          url: "bin/NewProject.swf?v=24",
          base: "bin/",
          allowScriptAccess: true,
          autoplay: "on",
          unmuteOverlay: "hidden",
          backgroundColor: "#11161b",
          letterbox: "on",
          warnOnUnsupportedContent: false,
          contextMenu: "off",
          playerVersion: 32,
        });
        setStatus("Loaded.");
        setTimeout(() => status.style.display = "none", 3000);
        installRightClickPanBridge(player);
      } catch (err) {
        console.error(err);
        setStatus("Failed to load NewProject.swf: " + err.message, true);
      }
    });
  </script>
</body>
</html>
